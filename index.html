<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con Imagen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header-container, .footer-container {
            width: 100%;
            background-color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 5rem;
            font-family: sans-serif;
            text-transform: uppercase;
            color: black; 
            mix-blend-mode: difference;
            filter: invert(1);
        }

        /* Estilos para el comunicado en el footer */
        .comunicado {
            margin: 0;
            font-size: 1.5rem; /* Ajustado para que el texto detallado sea legible */
            font-family: sans-serif;
            font-weight: bold;
            color: black;
            mix-blend-mode: difference;
            filter: invert(1);
            line-height: 1.4;
        }

        .ruta-box {
            margin-bottom: 15px;
        }

        .image-container {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
            overflow: hidden;
        }

        .fullscreen-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .comunicado {
                font-size: 1rem;
            }
            .header-container, .footer-container {
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>

    <header class="header-container">
        <h1>LEE ATETANTEMENTE</h1>
    </header>

    <main class="image-container">
        <img src="foto.png" alt="Descripción de la imagen" class="fullscreen-img">
    </main>

    <footer class="footer-container">
        <div class="comunicado">
            <p>LUNES A VIERNES</p>
            
            <div class="ruta-box">
                Ruta D<br>
                sube cementerio<br>
                NO PASA por casa del sr Americo
            </div>

            <div class="ruta-box">
                Ruta Villa<br>
                NO sube cementerio<br>
                SI PASAN por casa del sr Americo
            </div>

            <p>ATENCION SECRETARIA<br>
            02:00 PM A 05:00 PM</p>
        </div>
    </footer>

</body>
</html>
